<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vicky's Collection | Infinite Luxury</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .loader-footer { text-align: center; padding: 40px; width: 100%; display: none; }
        .no-more-data { text-align: center; padding: 50px; color: #888; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; display: none; }

        /* Size Badge */
        .size-badge {
            position: absolute; top: 10px; left: 10px;
            background: rgba(255, 255, 255, 0.9); color: #1a1a1a;
            padding: 4px 10px; font-size: 0.7rem; font-weight: 700;
            border-radius: 2px; z-index: 10;
        }

        /* OUT OF STOCK BADGE */
        .out-of-stock-badge {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7); color: white;
            padding: 10px 20px; font-weight: bold;
            letter-spacing: 2px; border-radius: 2px;
            z-index: 20; pointer-events: none;
            width: 80%; text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Dim the image if out of stock */
        .is-sold-out img {
            filter: grayscale(1) brightness(0.7);
        }

        .shop-img-wrapper { position: relative; overflow: hidden; }
        
        /* Disable Add to Cart UI if sold out */
        .btn-disabled {
            background: #ccc !important;
            cursor: not-allowed !important;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <nav id="navbar">
        <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">VICKY'S</div>
        <div class="nav-icons">
            <a href="index.html">Home</a>
            <a href="addtocart.html"><i class="fas fa-shopping-bag"></i></a>
        </div>
    </nav>

    <header class="section-header" style="text-align: center; padding: 80px 20px; background: #fafafa;">
        <h1 style="letter-spacing: 8px; font-weight: 300;">THE VAULT</h1>
        <p style="color: #666; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">Scroll to explore</p>
    </header>

    <section class="shop-container">
        <div class="shop-grid" id="infinite-grid"></div>
        <div class="loader-footer" id="bottom-loader">
            <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; color: #1a1a1a;"></i>
        </div>
        <div class="no-more-data" id="end-message">
            <p>You have viewed the entire collection</p>
        </div>
    </section>

<script src="fetch.js"></script>
<script>
    let allProducts = [];
    let currentIndex = 0;
    const itemsPerBatch = 8;
    let isLoading = false;

    // --- UTILITY FUNCTIONS (FIXED) ---
    function fixImg(url) {
        if (!url) return 'placeholder.jpg';
        if (url.startsWith('http')) return url;
        // If your images are stored on the server, uncomment and use your API URL:
        // return `https://ecommerceapi-f6ep.onrender.com/${url}`;
        return url;
    }

    function normalizeSize(rawSize) {
        if (!rawSize || rawSize === "null" || rawSize === "undefined") return "OS";
        const s = rawSize.toString().trim().toUpperCase();
        const map = { 
            'SMALL': 'S', 
            'MEDIUM': 'M', 
            'LARGE': 'L', 
            'EXTRA LARGE': 'XL', 
            'EXTRA SMALL': 'XS',
            'OS': 'OS',
            'ONE SIZE': 'OS'
        };
        return map[s] || s;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const grid = document.getElementById('infinite-grid');
        try {
            // fetchAllProducts must be defined in fetch.js
            const response = await fetchAllProducts();
            let products = response?.data?.data || response?.data || response?.products || response;
            
            if (!products || !Array.isArray(products) || products.length === 0) {
                grid.innerHTML = "<div style='text-align:center; width:100%; padding:100px;'><h3>THE VAULT IS CURRENTLY EMPTY</h3></div>";
                return;
            }

            allProducts = products;
            loadMoreItems(); 
        } catch (error) {
            console.error("Database Fetch Error:", error);
            grid.innerHTML = "<p style='text-align:center; width:100%;'>Unable to connect to the Vault.</p>";
        }
    });

    function loadMoreItems() {
        if (isLoading || currentIndex >= allProducts.length) return;
        isLoading = true;
        document.getElementById('bottom-loader').style.display = 'block';

        // Get user's preferred size for the warning
        const rawUser = localStorage.getItem('vicky_user');
        let userPreferredSize = null;
        if (rawUser && rawUser !== "undefined") {
            const user = JSON.parse(rawUser);
            userPreferredSize = normalizeSize(user.default_size);
        }

        setTimeout(() => {
            const grid = document.getElementById('infinite-grid');
            const nextBatch = allProducts.slice(currentIndex, currentIndex + itemsPerBatch);

            nextBatch.forEach(product => {
                const rawImg = product.imageUrl || product.image_url || product.image;
                const imageSrc = fixImg(rawImg); 

                const variant = product.variants?.[0] || null;
                const rawSize = variant ? variant.size : (product.size || "OS");
                const displaySize = normalizeSize(rawSize); 
                
                // 1. Calculate Stock
                const totalStock = product.variants 
                    ? product.variants.reduce((sum, v) => sum + (Number(v.stock) || 0), 0) 
                    : (Number(product.stock) || 0);
                
                const isOutOfStock = totalStock <= 0;

                // 2. Check Size Match
                const sizeMismatch = userPreferredSize && 
                                     userPreferredSize !== "N/A" && 
                                     userPreferredSize !== "OS" && 
                                     displaySize !== userPreferredSize;
                
                const card = document.createElement('div');
                card.className = 'shop-card';
                card.innerHTML = `
                    <div class="shop-img-wrapper ${isOutOfStock ? 'is-sold-out' : ''}">
                        <div class="size-badge">${displaySize}</div>
                        ${isOutOfStock ? '<div class="out-of-stock-badge">SOLD OUT</div>' : ''}
                        
                        <img src="${imageSrc}" alt="${product.name}" onerror="this.src='placeholder.jpg'">
                        
                        <div class="cart-overlay">
                            ${isOutOfStock 
                                ? `<button class="add-btn btn-disabled" disabled>Sold Out</button>` 
                                : `<button class="add-btn" onclick="addToBag('${product._id}', '${rawSize}')">Add to Cart</button>`
                            }
                        </div>
                    </div>
                    <div class="shop-info">
                        <p class="brand-tag">VICKY'S LUXURY</p>
                        <h4 class="product-name">${product.name}</h4>
                        <p class="product-price">₦${Number(product.price).toLocaleString()}</p>
                        
                        ${sizeMismatch ? 
                            `<p style="color: #d35400; font-size: 0.7rem; font-weight: bold; margin-top: 5px; text-transform: uppercase;">
                                <i class="fa-solid fa-circle-info"></i> Not your size (${userPreferredSize})
                             </p>` : ''
                        }
                    </div>`;
                grid.appendChild(card);
            });

            currentIndex += itemsPerBatch;
            isLoading = false;
            document.getElementById('bottom-loader').style.display = 'none';
            if (currentIndex >= allProducts.length) {
                document.getElementById('end-message').style.display = 'block';
            }
        }, 600);
    }

    function addToBag(productId, rawSize) {
        const token = localStorage.getItem('vicky_token');
        if (!token) {
            alert("Please login first to shop our collection.");
            window.location.href = 'signupform.html';
            return;
        }

        const product = allProducts.find(p => p._id === productId);
        if (!product) return;

        const variant = product.variants?.find(v => v.size === rawSize) || null;
        const availableStock = variant ? variant.stock : (product.stock || 0);
        const cleanSize = normalizeSize(rawSize);

        let cart = JSON.parse(localStorage.getItem('vicky_cart') || '[]');
        const existing = cart.find(item => item.id === productId && item.size === rawSize);

        if (existing && existing.quantity >= availableStock) {
            alert(`Limit Reached: Only ${availableStock} available in size ${cleanSize}.`);
            return;
        }

        if (existing) {
            existing.quantity += 1;
        } else {
            cart.push({
                id: product._id,
                name: product.name,
                price: product.price,
                image: fixImg(product.imageUrl || product.image),
                size: rawSize,
                displaySize: cleanSize,
                quantity: 1
            });
        }

        localStorage.setItem('vicky_cart', JSON.stringify(cart));
        alert(`✨ ${product.name} (Size: ${cleanSize}) added to bag!`);
    }

    window.addEventListener('scroll', () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 900) {
            loadMoreItems();
        }
    });
</script>
</body>
</html>
