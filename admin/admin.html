<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard | Vicky's</title>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand">VICKY ADMIN</div>
    <a href="admin.html" class="active">Dashboard</a>
    <a href="adminorder.html">Add Product</a>
    <a href="adminproduct.html">Product List</a>
    <a href="orders.html">Orders</a>
    <a href="#" onclick="logoutAdmin()">Logout</a>
  </nav>

  <main class="content">
    <header class="topbar">
      <h2>Dashboard Overview</h2>
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>

    </header>

    <section class="stats">
      <div class="card"><p>Total Products</p><h3 id="stat-products">...</h3></div>
      <div class="card"><p>Total Orders</p><h3 id="stat-orders">...</h3></div>
      <div class="card"><p>Revenue</p><h3 id="stat-revenue">₦0</h3></div>
    </section>

    <div class="container-box">
      <h4>Recent Orders</h4>
      <div id="recent-orders-container">
        <p style="padding:20px; color:gray;">Loading live data...</p>
      </div>
    </div>
  </main>

  <script src="fetch.js"></script>
  <script src="admin.js"></script>
  <script>
    function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('active');
}

// Close sidebar when clicking outside on mobile
document.addEventListener('click', function(event) {
    const sidebar = document.querySelector('.sidebar');
    const menuBtn = document.querySelector('.menu-btn');
    
    if (window.innerWidth < 768) {
        if (!sidebar.contains(event.target) && !menuBtn.contains(event.target)) {
            sidebar.classList.remove('active');
        }
    }
});
  </script>
</body>
</html>
