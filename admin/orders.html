<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Orders | Vicky's Admin</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand">VICKY ADMIN</div>
    <a href="admin.html">Dashboard</a>
    <a href="adminorder.html">Add Product</a>
    <a href="adminproduct.html">Product List</a>
    <a href="orders.html" class="active">Orders</a>
    <a href="#" onclick="logoutAdmin()">Logout</a>
  </nav>

  <main class="content">
    <header class="topbar">
      <h2>Customer Orders</h2>
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    </header>

    <div class="container-box">
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Items</th>
              <th>Amount</th>
              <th>Status</th>
              <th style="text-align: center;">Action</th>
            </tr>
          </thead>
          <tbody id="orderList">
              <tr><td colspan="6" style="text-align:center; padding:20px;">Fetching orders...</td></tr>
          </tbody>
        </table>
    </div>
  </main>

  <script src="fetch.js"></script>
  <script>
    async function loadOrdersTable() {
        const tableBody = document.getElementById('orderList');
        
        try {
            const result = await fetchAllOrders();
            
            if (result.success && result.data.length > 0) {
                tableBody.innerHTML = result.data.map(order => {
                    
                    // Format items list for the table cell
                    const itemsHtml = order.items.map(item => `
                        <div style="margin-bottom: 8px; border-left: 2px solid var(--accent-gold); padding-left: 8px;">
                            <span style="display:block; font-weight: 600;">${item.name}</span>
                            <span style="font-size: 0.75rem; color: #666;">
                                Size: <strong>${item.size || 'N/A'}</strong> | Qty: ${item.qty}
                            </span>
                        </div>
                    `).join('');

                    // Format Date
                    const orderDate = new Date(order.createdAt).toLocaleDateString(undefined, {
                        year: 'numeric', month: 'short', day: 'numeric'
                    });

                    return `
                        <tr>
                            <td>
                                <strong>#${order._id.slice(-5).toUpperCase()}</strong><br>
                                <small style="color:gray;">${orderDate}</small>
                            </td>
                            <td>
                                <strong>${order.userId?.firstName || 'Guest'}</strong><br>
                                <small style="color:gray;">${order.userId?.email || 'No email'}</small>
                            </td>
                            <td>${itemsHtml}</td>
                            <td>₦${Number(order.totalAmount || 0).toLocaleString()}</td>
                            <td>
                                <span class="status ${order.status.toLowerCase()}">
                                    ${order.status}
                                </span>
                            </td>
                            <td style="text-align: center;">
                                <button class="btn" style="padding: 5px 10px; font-size: 0.8rem; width: auto;" 
                                        onclick="updateStatus('${order._id}')">
                                    Update
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } else {
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:20px;">No orders found.</td></tr>`;
            }
        } catch (error) {
            console.error("Table Load Error:", error);
            tableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px; color:var(--danger);">Connection Error.</td></tr>';
        }
    }

    function logoutAdmin() {
        localStorage.removeItem('vicky_admin_token');
        window.location.href = 'adminlogin.html';
    }

    // You should define updateStatus function here or in an external file
    async function updateStatus(orderId) {
        const newStatus = prompt("Enter new status (Pending, Paid, Shipped, Delivered):");
        if (newStatus) {
            // Logic to call your backend API to update status via fetch.js
            console.log(`Updating order ${orderId} to ${newStatus}`);
        }
    }

    // Initial load
    document.addEventListener('DOMContentLoaded', loadOrdersTable);
    function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('active');
}

// Close sidebar when clicking outside on mobile
document.addEventListener('click', function(event) {
    const sidebar = document.querySelector('.sidebar');
    const menuBtn = document.querySelector('.menu-btn');
    
    if (window.innerWidth < 768) {
        if (!sidebar.contains(event.target) && !menuBtn.contains(event.target)) {
            sidebar.classList.remove('active');
        }
    }
});
  </script>
</body>
</html>
